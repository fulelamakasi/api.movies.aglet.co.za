components:
  schemas:
    ContactUsRequest:
      description: A record of contact_us lists
      required:
        - name
        - message
        - email
        - phone_number
        - company_name
      type: object
      properties:
        name:
          description: >-
            The name of the person who needs to be contacted.
          type: string
          example: "John Doe"
        message:
          description: A short descriptive text about the reason why they need to be contacted.
          type: string
          example: "I am enquiring on an inquiry about the inquiry of inquiries"
        email:
          description: >-
            The email of the person who needs to be contacted.
          type: string
          example: "john@aglet.co.za"
        phone_number:
          description: The phone number of the person who needs to be contacted..
          type: string
          example: "0797666321"
        company_name:
          description: >-
            The organisation of the person who needs to be contacted.
          type: string
          example: "Swift Operators"
      example:
        {
          name: "John Doe",
          message: "I am enquiring on an inquiry about the inquiry of inquiries",
          email: "john@aglet.co.za",
          phone_number: "0797666321",
          company_name: "Swift Operators"
        }

    ContactUsResponse:
      description: A record for a specific language
      type: object
      properties:
        id:
          description: >-
            The unique identifier of the keyword record.  This is ignored when adding a new record.  
            The service allocates an new unique ID to this record.
          type: integer
          example: "1"
        name:
          description: >-
            The name of the person who needs to be contacted.
          type: string
          example: "John Doe"
        message:
          description: A short descriptive text about the reason why they need to be contacted.
          type: string
          example: "I am enquiring on an inquiry about the inquiry of inquiries"
        email:
          description: >-
            The email of the person who needs to be contacted.
          type: string
          example: "john@aglet.co.za"
        phone_number:
          description: The phone number of the person who needs to be contacted..
          type: string
          example: "0797666321"
        company_name:
          description: >-
            The organisation of the person who needs to be contacted.
          type: string
          example: "Swift Operators"
        is_actioned:
          description: A flag to state whether the contact us has been responded to or not.
          type: integer
          example: "0"                   
        created_at:
          description: The system generated date which a record was created
          type: string
          example: "2020-03-26 19:00:00"
        updated_at:
          description: The system generated date which whenever a record is modified it gets updated
          type: string
          example: "2020-03-27 19:01:59"
      example:
        {
          id: 2,
          name: "John Doe",
          message: "I am enquiring on an inquiry about the inquiry of inquiries",
          email: "john@aglet.co.za",
          phone_number: "0797666321",
          company_name: "Swift Operators",
          is_actioned: 0,
          created_at: "2026-03-15 19:00:00",
          updated_at: ""
        }

    LanguageRequest:
      description: A record of languages
      required:
        - name
        - description
      type: object
      properties:
        name:
          description: >-
            A descriptive name of a language.
          type: string
          example: "English"
        description:
          description: A short descriptive text about the language.
          type: string
          example: "all"
      example:
        {
          name: "English",
          description: "The oldest language"
        }

    LanguageResponse:
      description: A record for a specific language
      type: object
      properties:
        id:
          description: >-
            The unique identifier of the keyword record.  This is ignored when adding a new record.  
            The service allocates an new unique ID to this record.
          type: integer
          example: "1"
        name:
          description: >-
