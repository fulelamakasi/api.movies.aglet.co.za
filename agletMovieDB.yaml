openapi: 3.0.3
info:
  title: Aglet The Movie dB
  description: |-
    The following information is kept:
    All endpoints related to a Aglets movies app
    
  version: 1.0.0
servers:
  - url: http://127.0.0.1:5000/api
paths:
  /auth/login/v1:
    post:
      tags:
        - Authentication
      summary: Returns an active user record.
      description: >-
        Verifies user credentials and returns a user object with a token for the user.
      operationId: login
      parameters:
        - name: User-Id
          in: header
          required: true
          schema:
            type: string
            example: "10235463-8728-0913-9837-127634524310"
      requestBody:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginRequest'          
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'   
        '400':
          description: Required fields are missing
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authentication Failed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ErrorResponse'                    
        '500':
          description: Validation exception
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ErrorResponse'

  /auth/renew-token/v1:
    put:
      tags:
        - Authentication
      summary: Returns an active user record with a new user-Id.
      description: >-
        Verifies user credentials and returns a new user object token for the api user.
      operationId: renew_token
      parameters:
        - name: User-Id
          in: header
          required: true
          schema:
            type: string
            example: "10235463-8728-0913-9837-127634524310"
      responses:
